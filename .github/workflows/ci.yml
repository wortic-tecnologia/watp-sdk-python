name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python scripts/watp-sdk-conformance-python.py
      - run: python -c "import watp_sdk; print(watp_sdk.__all__)"
